<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">

  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="2" fill="#0071e3" opacity="0.6"/>

  <!-- Terminal logomark — locked design -->
  <rect x="60" y="55" width="110" height="110" fill="#0f0f18" rx="16" stroke="#1e1e2e" stroke-width="1.5"/>
  <rect x="60" y="55" width="110" height="28" fill="#161622" rx="16"/>
  <rect x="60" y="73" width="110" height="10" fill="#161622"/>
  <circle cx="78" cy="69" r="5" fill="#ff5f57"/>
  <circle cx="93" cy="69" r="5" fill="#febc2e"/>
  <circle cx="108" cy="69" r="5" fill="#28c840"/>
  <!-- ~/ship on one clean line, no cursor overlap -->
  <text x="72" y="128" font-family="'Courier New',monospace" font-size="24" font-weight="700" fill="#6c63ff">~</text>
  <text x="86" y="128" font-family="'Courier New',monospace" font-size="24" font-weight="400" fill="#3a3a5c">/</text>
  <text x="97" y="128" font-family="'Courier New',monospace" font-size="24" font-weight="700" fill="#0071e3">ship</text>
  <!-- Cursor sits after ship with a gap -->
  <rect x="154" y="108" width="9" height="24" fill="#0071e3" rx="2" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="188" y="125" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#f0f0f5">ShipStacked</tspan><tspan fill="#0071e3">.</tspan>
  </text>

  <!-- Main tagline -->
  <text x="60" y="310" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="700" letter-spacing="-2.5" fill="#f0f0f5">Proof-of-work hiring</text>
  <text x="60" y="400" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="700" letter-spacing="-2.5" fill="#f0f0f5">for the vibe coding</text>
  <text x="60" y="490" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="700" letter-spacing="-2.5" fill="#6c63ff">generation.</text>

  <!-- Footer -->
  <text x="60" y="590" font-family="'Courier New',monospace" font-size="17" fill="#3a3a5c">~/ship → shipstacked.com · free for builders · $199/mo to hire · no commissions</text>

</svg>
